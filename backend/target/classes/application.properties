# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/project_management
spring.datasource.username=postgres
spring.datasource.password=my_project
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# For development: use H2 if PostgreSQL not available (uncomment to use)
# spring.datasource.url=jdbc:h2:mem:pmdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.h2.console.enabled=true
